name: pruefpilot

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pruefpilot
      POSTGRES_PASSWORD: pruefpilot_dev
      POSTGRES_DB: pruefpilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pruefpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pruefpilot:pruefpilot_dev@db:5432/pruefpilot
      DATABASE_URL_SYNC: postgresql://pruefpilot:pruefpilot_dev@db:5432/pruefpilot
      APP_ENV: development
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  # React Frontend (Vite Dev Server)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
